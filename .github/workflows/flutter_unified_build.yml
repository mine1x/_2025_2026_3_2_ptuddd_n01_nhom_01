name: Flutter Unified Build Per Commit

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        required: true

concurrency:
  group: unified-${{ github.event.inputs.commit_sha }}
  cancel-in-progress: true

jobs:
  # ================= JOB 1: TỰ ĐỘNG TẠO TAG & TRÍCH XUẤT THÔNG TIN COMMIT =================
  generate-tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tagger.outputs.new_tag }}
      commit_info: ${{ steps.get_info.outputs.commit_info }} # 👑 Xuất thông tin người commit & message
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha }}
          fetch-depth: 0
          
      - id: tagger
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

      # ⚡ Trích xuất tên người commit và nội dung commit message đúng định dạng yêu cầu
      - id: get_info
        run: |
          AUTHOR=$(git log -1 --format='%an' ${{ github.event.inputs.commit_sha }})
          MESSAGE=$(git log -1 --format='%B' ${{ github.event.inputs.commit_sha }})
          
          # Định dạng: Tên người commit [Xuống dòng] Commit Message
          # Sử dụng GITHUB_OUTPUT đa dòng (Multiline) để giữ nguyên cấu trúc xuống dòng
          echo "commit_info<<EOF" >> $GITHUB_OUTPUT
          echo "$AUTHOR" >> $GITHUB_OUTPUT
          echo "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # ================= JOB 2: BUILD ANDROID =================
  build-android:
    needs: generate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha }}
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
            build/app/intermediates
          key: android-max-${{ runner.os }}-${{ hashFiles('android/build.gradle') }}
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get && flutter build apk --target-platform android-arm64 --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-artifact
          path: build/app/outputs/flutter-apk/app-release.apk

  # ================= JOB 3: BUILD WEB =================
  build-web:
    needs: generate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/cache@v4
        with:
          path: |
            .dart_tool/build
            build/web
          key: web-max-${{ hashFiles('pubspec.lock') }}
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get && flutter build web --release
      - run: cd build/web && zip -r ../../web-release.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: web-artifact
          path: web-release.zip

  # ================= JOB 4: BUILD LINUX =================
  build-linux:
    needs: generate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha }}
      - run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev ccache
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: linux-ccache-${{ github.event.inputs.commit_sha }}
          restore-keys: linux-ccache-
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: |
          export PATH="/usr/lib/ccache:$PATH"
          flutter pub get && flutter build linux --release
      - run: cd build/linux/x64/release/bundle && zip -r ../../../../../linux-release.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: linux-release.zip

# ================= JOB 5: BUILD WINDOWS =================
  build-windows:
    needs: generate-tag
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha }}
      - run: choco install sccache
      - uses: actions/cache@v4
        with:
          path: $USERPROFILE\AppData\Local\Mozilla\sccache
          key: windows-sccache-${{ github.event.inputs.commit_sha }}
          restore-keys: windows-sccache-
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Build Windows
        run: |
          export RUSTC_WRAPPER="sccache"
          flutter pub get && flutter build windows --release
        shell: bash # 👑 SỬA Ở ĐÂY: Đổi từ powershell sang bash
      - run: Compress-Archive -Path build\windows\x64\release\runner\* -DestinationPath windows-release.zip
        shell: powershell # Bước zip này vẫn giữ powershell để chạy lệnh Compress-Archive của Windows
      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: windows-release.zip
  # ================= JOB 6: GOM FILE VÀ ĐĂNG RELEASE KÈM ĐỊNH DẠNG MÔ TẢ =================
  post-combined-release:
    needs: [generate-tag, build-android, build-web, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: local-artifacts

      - name: Organize Files
        run: |
          mkdir final-files
          TAG=${{ needs.generate-tag.outputs.new_tag }}
          cp local-artifacts/android-artifact/app-release.apk final-files/app-release-$TAG.apk
          cp local-artifacts/web-artifact/web-release.zip final-files/web-$TAG.zip
          cp local-artifacts/linux-artifact/linux-release.zip final-files/linux-$TAG.zip
          cp local-artifacts/windows-artifact/windows-release.zip final-files/windows-$TAG.zip

      - name: Create Single GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.generate-tag.outputs.new_tag }}
          name: "Release Unified ${{ needs.generate-tag.outputs.new_tag }}"
          draft: true
          # 👑 Điền thông tin mô tả lấy từ Job 1 (Tên người commit + Xuống dòng + Message)
          body: ${{ needs.generate-tag.outputs.commit_info }}
          files: |
            final-files/app-release-${{ needs.generate-tag.outputs.new_tag }}.apk
            final-files/web-${{ needs.generate-tag.outputs.new_tag }}.zip
            final-files/linux-${{ needs.generate-tag.outputs.new_tag }}.zip
            final-files/windows-${{ needs.generate-tag.outputs.new_tag }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}